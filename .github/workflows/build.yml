name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: JDK 21 Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out OODT
        uses: actions/checkout@v4
        with:
          repository: chrismattmann/oodt
          ref: master
          path: oodt

      - name: Check out DRAT
        uses: actions/checkout@v4
        with:
          path: drat

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: drat/webapps/proteus-new/src/main/webapp/resources/package-lock.json

      - name: Install modernized OODT snapshot
        working-directory: oodt
        run: mvn -B -DskipTests clean install

      - name: Build DRAT
        working-directory: drat
        run: mvn -B -DskipTests clean install

      - name: Upload DRAT distribution
        uses: actions/upload-artifact@v4
        with:
          name: drat-distribution
          path: drat/distribution/target/dms-distribution-*-bin.tar.gz
          if-no-files-found: error
